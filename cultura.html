<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cultura — Sito Personale</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-utente">

  <main class="container">

    <header class="app-header">
      <span class="eyebrow">Profilo</span>
      <h1>📚 Cultura</h1>
      <p>Libri, serie TV e film che mi hanno colpito.</p>
      <a class="back-link" href="utente.html">← Torna al profilo</a>
    </header>

    <!-- ============================ -->
    <!-- LIBRI -->
    <!-- ============================ -->
    <h2 class="section-title">📖 Libri</h2>

    <article class="card media-card">
      <img class="media-cover" src="https://placehold.co/120x160/8b5cf6/ffffff?text=Libro" alt="Copertina" />
      <div>
        <h3>Il nome della rosa</h3>
        <p style="font-size:13px"><b>Autore:</b> Umberto Eco</p>
        <span class="tag">Romanzo storico</span>
        <div class="stars">★★★★<span class="off">★</span></div>
      </div>
    </article>

    <!-- AGGIUNGI QUI NUOVO LIBRO (copia il blocco <article class="card media-card">) -->

    <!-- ============================ -->
    <!-- SERIE TV -->
    <!-- ============================ -->
    <h2 class="section-title">📺 Serie TV</h2>

    <article class="card media-card">
      <img class="media-cover" src="https://placehold.co/120x160/ec4899/ffffff?text=Serie" alt="Copertina" />
      <div>
        <h3>Breaking Bad</h3>
        <p style="font-size:13px"><b>Autore:</b> Vince Gilligan</p>
        <span class="tag">Crime / Drama</span>
        <div class="stars">★★★★★</div>
      </div>
    </article>

    <!-- AGGIUNGI QUI NUOVA SERIE TV -->

    <!-- ============================ -->
    <!-- FILM -->
    <!-- ============================ -->
    <h2 class="section-title">🎬 Film</h2>

    <article class="card media-card">
      <img class="media-cover" src="https://placehold.co/120x160/6366f1/ffffff?text=Film" alt="Copertina" />
      <div>
        <h3>Inception</h3>
        <p style="font-size:13px"><b>Regista:</b> Christopher Nolan</p>
        <span class="tag">Fantascienza</span>
        <div class="stars">★★★★★</div>
      </div>
    </article>

    <!-- AGGIUNGI QUI NUOVO FILM -->

  </main>

</body>
</html>

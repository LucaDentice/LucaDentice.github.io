<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Allenamento — Sito Personale</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="page-allenamento">

  <main class="container">

    <!-- ============================================================
         SCHERMATA INIZIALE — selezione attività
         ============================================================ -->
    <section id="screen-home">
      <header class="app-header">
        <span class="eyebrow">Workout</span>
        <h1>🏋️ Allenamento</h1>
        <p>Scegli l'attività di oggi.</p>
      </header>

      <div class="activity-grid">
        <button class="activity-btn" data-activity="dinamico">
          <span class="ic">🌅</span>
          <span>Stretching dinamico</span>
        </button>
        <button class="activity-btn" data-activity="statico">
          <span class="ic">🌙</span>
          <span>Stretching statico</span>
        </button>
        <button class="activity-btn" data-activity="abs">
          <span class="ic">🔥</span>
          <span>Circuito ABS</span>
        </button>
        <button class="activity-btn" data-activity="allenamento">
          <span class="ic">💪</span>
          <span>Allenamento</span>
        </button>
      </div>
    </section>

    <!-- ============================================================
         SCHERMATA ALLENAMENTO IN CORSO
         ============================================================ -->
    <section id="screen-workout" hidden>

      <header class="app-header">
        <span class="eyebrow" id="workout-label">Attività</span>
        <h1>🔴 Allenamento in corso</h1>
      </header>

      <!-- Timer sempre visibile (sticky) -->
      <div class="timer-bar">
        <div class="timer-display" id="timer-display">00:00</div>
        <div class="timer-controls">
          <button id="timer-start" class="t-btn t-start">▶ Start</button>
          <button id="timer-stop" class="t-btn t-stop">⏸ Stop</button>
          <button id="timer-reset" class="t-btn t-reset">⟳ Reset</button>
        </div>
      </div>

      <h2 class="section-title">Esercizi</h2>
      <ul id="exercise-list" class="exercise-list"></ul>

      <button id="exit-workout" class="btn btn-secondary" style="margin-top:14px">⨉ Esci dall'allenamento</button>
    </section>

  </main>

  <!-- ============================================================
       LISTE ESERCIZI — modifica liberamente
       Ogni esercizio: data-name, data-sets, data-reps, data-weight
       ============================================================ -->

  <!-- STRETCHING DINAMICO -->
  <template id="ex-dinamico">
    <li data-name="Leg swing" data-sets="2" data-reps="15/lato" data-weight="Corpo libero"></li>
    <li data-name="Arm circles" data-sets="2" data-reps="20" data-weight="Corpo libero"></li>
    <li data-name="High knees" data-sets="2" data-reps="30 sec" data-weight="Corpo libero"></li>
    <!-- AGGIUNGI QUI NUOVO ESERCIZIO STRETCHING DINAMICO -->
  </template>

  <!-- STRETCHING STATICO -->
  <template id="ex-statico">
    <li data-name="Allungamento ischiocrurali" data-sets="3" data-reps="30 sec" data-weight="Corpo libero"></li>
    <li data-name="Allungamento quadricipiti" data-sets="3" data-reps="30 sec" data-weight="Corpo libero"></li>
    <li data-name="Allungamento polpacci" data-sets="3" data-reps="30 sec" data-weight="Corpo libero"></li>
    <!-- AGGIUNGI QUI NUOVO ESERCIZIO STRETCHING STATICO -->
  </template>

  <!-- CIRCUITO ABS -->
  <template id="ex-abs">
    <li data-name="Plank" data-sets="3" data-reps="45 sec" data-weight="Corpo libero"></li>
    <li data-name="Crunch" data-sets="3" data-reps="20" data-weight="Corpo libero"></li>
    <li data-name="Russian twist" data-sets="3" data-reps="20" data-weight="5 kg"></li>
    <!-- AGGIUNGI QUI NUOVO ESERCIZIO CIRCUITO ABS -->
  </template>

  <!-- ============================================================
       ALLENAMENTO GIORNALIERO
       Una scheda per ogni giorno della settimana.
       Lo script seleziona automaticamente quella corrispondente
       al giorno corrente (data-day = 0 dom ... 6 sab).
       Per usarne una diversa, decommentare quella desiderata
       e commentare le altre.
       ============================================================ -->

  <!-- LUNEDÌ — Petto / Tricipiti -->
  <template id="ex-allenamento-1" data-label="Lunedì — Petto / Tricipiti">
    <li data-name="Panca piana" data-sets="4" data-reps="8" data-weight="60 kg"></li>
    <li data-name="Panca inclinata manubri" data-sets="3" data-reps="10" data-weight="22 kg"></li>
    <li data-name="French press" data-sets="3" data-reps="12" data-weight="20 kg"></li>
    <!-- AGGIUNGI QUI NUOVO ESERCIZIO LUNEDÌ -->
  </template>

  <!-- MARTEDÌ — Schiena / Bicipiti -->
  <template id="ex-allenamento-2" data-label="Martedì — Schiena / Bicipiti">
    <li data-name="Trazioni" data-sets="4" data-reps="6" data-weight="Corpo libero"></li>
    <li data-name="Rematore bilanciere" data-sets="3" data-reps="10" data-weight="50 kg"></li>
    <li data-name="Curl bilanciere" data-sets="3" data-reps="12" data-weight="25 kg"></li>
    <!-- AGGIUNGI QUI NUOVO ESERCIZIO MARTEDÌ -->
  </template>

  <!-- MERCOLEDÌ — Riposo attivo -->
  <template id="ex-allenamento-3" data-label="Mercoledì — Riposo attivo">
    <li data-name="Camminata veloce" data-sets="1" data-reps="30 min" data-weight="—"></li>
    <li data-name="Mobilità anche" data-sets="3" data-reps="10/lato" data-weight="Corpo libero"></li>
    <!-- AGGIUNGI QUI NUOVO ESERCIZIO MERCOLEDÌ -->
  </template>

  <!-- GIOVEDÌ — Gambe -->
  <template id="ex-allenamento-4" data-label="Giovedì — Gambe">
    <li data-name="Squat con bilanciere" data-sets="4" data-reps="8" data-weight="80 kg"></li>
    <li data-name="Affondi manubri" data-sets="3" data-reps="10/lato" data-weight="16 kg"></li>
    <li data-name="Calf raise" data-sets="4" data-reps="15" data-weight="40 kg"></li>
    <!-- AGGIUNGI QUI NUOVO ESERCIZIO GIOVEDÌ -->
  </template>

  <!-- VENERDÌ — Spalle / Core -->
  <template id="ex-allenamento-5" data-label="Venerdì — Spalle / Core">
    <li data-name="Military press" data-sets="4" data-reps="8" data-weight="35 kg"></li>
    <li data-name="Alzate laterali" data-sets="3" data-reps="12" data-weight="8 kg"></li>
    <li data-name="Plank" data-sets="3" data-reps="60 sec" data-weight="Corpo libero"></li>
    <!-- AGGIUNGI QUI NUOVO ESERCIZIO VENERDÌ -->
  </template>

  <!-- SABATO — Full body -->
  <template id="ex-allenamento-6" data-label="Sabato — Full body">
    <li data-name="Stacco da terra" data-sets="4" data-reps="6" data-weight="90 kg"></li>
    <li data-name="Push press" data-sets="3" data-reps="8" data-weight="40 kg"></li>
    <!-- AGGIUNGI QUI NUOVO ESERCIZIO SABATO -->
  </template>

  <!-- DOMENICA — Riposo / mobilità -->
  <template id="ex-allenamento-0" data-label="Domenica — Mobilità">
    <li data-name="Mobilità completa" data-sets="1" data-reps="20 min" data-weight="—"></li>
    <!-- AGGIUNGI QUI NUOVO ESERCIZIO DOMENICA -->
  </template>

  <nav class="bottom-nav" aria-label="Menu">
    <ul>
      <li><a href="index.html"><span class="ic">🏠</span>Home</a></li>
      <li><a href="task.html"><span class="ic">📅</span>Task</a></li>
      <li><a href="utente.html"><span class="ic">👤</span>Utente</a></li>
      <li><a href="calcio.html"><span class="ic">⚽</span>Calcio</a></li>
      <li><a href="allenamento.html" class="active"><span class="ic">🏋️</span>Workout</a></li>
    </ul>
  </nav>

  <script src="script.js"></script>
</body>
</html>
